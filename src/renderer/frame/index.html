<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>녹화 영역</title>
    <style>
      :root { font-family: 'Segoe UI', system-ui, sans-serif; }
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
      body { position: relative; user-select: none; -webkit-user-select: none; }

      /* 상단 컨트롤 바 (녹화 영역 바깥 → 영상에 안 찍힘) */
      #bar {
        position: absolute; top: 0; left: 0; right: 0; height: 36px;
        display: flex; align-items: center; gap: 8px; padding: 0 8px;
        background: #20242e; color: #e8eaf0; font-size: 12px;
        border-radius: 6px 6px 0 0;
        -webkit-app-region: drag;
      }
      #bar .grip { color: #6b7185; font-size: 13px; cursor: move; }
      #size { font-variant-numeric: tabular-nums; font-weight: 600; letter-spacing: .02em; }
      #fps { color: #8b91a3; }
      .spacer { flex: 1; }
      #bar button {
        -webkit-app-region: no-drag;
        border: 0; border-radius: 5px; cursor: pointer;
        font-size: 12px; font-weight: 700; padding: 6px 12px; color: #fff;
        display: inline-flex; align-items: center; gap: 6px;
      }
      #recBtn { background: linear-gradient(135deg, #e0455a, #c0334a); }
      #recBtn:hover { filter: brightness(1.08); }
      #recBtn .dot { width: 9px; height: 9px; border-radius: 50%; background: #fff; }
      body.recording #recBtn { background: #2c3142; box-shadow: inset 0 0 0 1px #e0455a; }
      body.recording #recBtn .dot { background: #e0455a; animation: blink 1s steps(2,start) infinite; }
      @keyframes blink { 50% { opacity: .25; } }
      #closeBtn { background: #3a4156; padding: 6px 10px; }
      #closeBtn:hover { background: #4a5269; }

      /* 녹화 영역 테두리 (안쪽이 실제 녹화 범위) */
      #area {
        position: absolute; top: 36px; left: 0; right: 0; bottom: 0;
        border: 2px solid #3aa0ff; border-top: none;
        pointer-events: none;
      }
      body.recording #area { border-color: #e0455a; }
      #inner { position: absolute; inset: 0; }

      /* 리사이즈 핸들 */
      .h {
        position: absolute; -webkit-app-region: no-drag; z-index: 5;
      }
      body.recording .h { display: none; }
      .h.n  { top: 36px; left: 8px; right: 8px; height: 6px; cursor: ns-resize; }
      .h.s  { bottom: 0; left: 8px; right: 8px; height: 6px; cursor: ns-resize; }
      .h.e  { top: 42px; bottom: 8px; right: 0; width: 6px; cursor: ew-resize; }
      .h.w  { top: 42px; bottom: 8px; left: 0; width: 6px; cursor: ew-resize; }
      .h.ne { top: 36px; right: 0; width: 12px; height: 12px; cursor: nesw-resize; }
      .h.nw { top: 36px; left: 0; width: 12px; height: 12px; cursor: nwse-resize; }
      .h.se { bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; }
      .h.sw { bottom: 0; left: 0; width: 14px; height: 14px; cursor: nesw-resize; }
      /* 우하단 핸들에만 살짝 표식 */
      .h.se::after {
        content: ''; position: absolute; right: 2px; bottom: 2px;
        width: 8px; height: 8px;
        border-right: 2px solid #3aa0ff; border-bottom: 2px solid #3aa0ff;
      }
    </style>
  </head>
  <body>
    <div id="bar">
      <span class="grip">⠿</span>
      <span id="size">0 × 0</span>
      <span id="fps"></span>
      <span class="spacer"></span>
      <button id="recBtn"><span class="dot"></span><span id="recLabel">녹화</span></button>
      <button id="closeBtn">✕</button>
    </div>

    <div id="area"><div id="inner"></div></div>

    <div class="h n"  data-dir="n"></div>
    <div class="h s"  data-dir="s"></div>
    <div class="h e"  data-dir="e"></div>
    <div class="h w"  data-dir="w"></div>
    <div class="h ne" data-dir="ne"></div>
    <div class="h nw" data-dir="nw"></div>
    <div class="h se" data-dir="se"></div>
    <div class="h sw" data-dir="sw"></div>

    <script type="module" src="./frame.ts"></script>
  </body>
</html>
