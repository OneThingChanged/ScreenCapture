<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>창 선택</title>
    <style>
      html, body {
        margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden;
        background: rgba(11,13,18,0.96); color: #e5e7eb;
        font-family: 'Segoe UI', system-ui, sans-serif; user-select: none;
      }
      header {
        padding: 18px 24px; font-size: 16px; font-weight: 600;
        display: flex; justify-content: space-between; align-items: center;
      }
      header .esc { font-size: 12px; color: #9ca3af; font-weight: 400; }
      #grid {
        display: grid; gap: 16px; padding: 0 24px 24px;
        grid-template-columns: repeat(auto-fill, minmax(220px, 280px));
        grid-auto-rows: max-content; align-content: start; justify-content: center;
        overflow-y: auto; height: calc(100vh - 64px); box-sizing: border-box;
      }
      .card {
        background: #1a1e27; border: 2px solid transparent; border-radius: 10px;
        overflow: hidden; cursor: pointer; transition: border-color .12s, transform .12s;
        color: inherit; font: inherit; padding: 0; text-align: left;
      }
      .card:hover { border-color: #2563eb; transform: translateY(-2px); }
      .card:focus-visible { outline: 3px solid #60a5fa; outline-offset: 2px; }
      .thumb {
        width: 100%; height: 130px; object-fit: contain; background: #0b0d12;
        display: block;
      }
      .title {
        padding: 8px 10px; font-size: 12px; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <header>
      <span>캡쳐할 창을 선택하세요</span>
      <span class="esc">ESC 취소</span>
    </header>
    <div id="grid"></div>
    <script type="module" src="./picker.ts"></script>
  </body>
</html>
