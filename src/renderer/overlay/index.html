<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>영역 선택</title>
    <style>
      html, body {
        margin: 0; padding: 0; width: 100vw; height: 100vh;
        overflow: hidden; cursor: crosshair; background: #000;
        user-select: none;
      }
      #freeze {
        position: fixed; inset: 0; width: 100vw; height: 100vh;
        object-fit: fill; display: block; -webkit-user-drag: none;
      }
      #canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; }
      #hint {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        font-family: 'Segoe UI', sans-serif; color: #fff; font-size: 15px;
        background: rgba(0,0,0,0.55); padding: 10px 18px; border-radius: 8px;
        pointer-events: none;
      }
      #size {
        position: fixed; font-family: 'Segoe UI', sans-serif; font-size: 12px;
        color: #fff; background: #2563eb; padding: 2px 8px; border-radius: 4px;
        pointer-events: none; display: none; white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <img id="freeze" />
    <canvas id="canvas"></canvas>
    <div id="hint">드래그하여 영역 선택 · ESC 취소</div>
    <div id="size"></div>
    <script type="module" src="./overlay.ts"></script>
  </body>
</html>
