<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>설정</title>
    <style>
      :root { font-family: 'Segoe UI', system-ui, sans-serif; }
      body { margin: 0; padding: 20px; background: #f5f6f8; color: #1f2330; }
      h1 { font-size: 18px; margin: 0 0 6px; }
      .page-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      h2 { font-size: 13px; margin: 18px 0 8px; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; }
      .field { margin-bottom: 12px; }
      label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
      input[type="text"], input[type="number"], select {
        width: 100%; box-sizing: border-box; padding: 8px 10px;
        border: 1px solid #cdd2dc; border-radius: 6px; font-size: 13px; background: #fff;
      }
      .row { display: flex; gap: 8px; align-items: center; }
      .row > * { flex: 1; }
      .row > button { flex: 0 0 auto; }
      .check { display: flex; align-items: center; gap: 8px; font-weight: 500; }
      .check input { width: auto; }
      button {
        padding: 8px 14px; border: 0; border-radius: 6px; cursor: pointer;
        background: #2563eb; color: #fff; font-size: 13px; font-weight: 600;
      }
      button.ghost { background: #e5e7eb; color: #1f2330; }
      .hint { font-size: 11px; color: #6b7280; margin-top: 4px; }
      .status { font-size: 12px; color: #16a34a; align-self: center; }
      .shortcut { cursor: pointer; background: #fff; }
      .shortcut.recording { border-color: #2563eb; background: #eef2ff; }
      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .update-card { padding: 12px; border: 1px solid #d7dce5; border-radius: 8px; background: #fff; }
      .update-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .update-version { font-size: 13px; font-weight: 700; }
      .update-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
      .update-message { margin-top: 8px; min-height: 16px; font-size: 12px; color: #4b5563; white-space: pre-wrap; }
      .update-message.error { color: #dc2626; }
      #updateProgress { width: 100%; height: 8px; margin-top: 10px; display: none; }
    </style>
  </head>
  <body>
    <div class="page-head">
      <h1>화면 캡쳐 설정</h1>
      <button class="ghost" id="home">← 홈</button>
    </div>

    <h2>저장</h2>
    <div class="field">
      <label>저장 폴더</label>
      <div class="row">
        <input type="text" id="saveDir" />
        <button class="ghost" id="browse">찾아보기</button>
      </div>
    </div>
    <div class="grid2">
      <div class="field">
        <label>이미지 포맷</label>
        <select id="imageFormat">
          <option value="png">PNG</option>
          <option value="jpg">JPG</option>
        </select>
      </div>
      <div class="field" id="jpgQualityField">
        <label>JPG 품질 (1-100)</label>
        <input type="number" id="jpgQuality" min="1" max="100" />
      </div>
    </div>
    <div class="field">
      <label>캡쳐 후 동작</label>
      <select id="afterCapture">
        <option value="both">저장 + 편집기 열기</option>
        <option value="save">즉시 저장만</option>
        <option value="editor">편집기만</option>
      </select>
    </div>
    <div class="field">
      <label class="check"><input type="checkbox" id="copyToClipboard" /> 클립보드에 자동 복사</label>
    </div>

    <h2>단축키 (클릭 후 키 입력)</h2>
    <div class="grid2">
      <div class="field"><label>영역 캡쳐</label><input type="text" class="shortcut" id="sc-region" readonly /></div>
      <div class="field"><label>창 캡쳐</label><input type="text" class="shortcut" id="sc-window" readonly /></div>
      <div class="field"><label>전체 캡쳐</label><input type="text" class="shortcut" id="sc-fullscreen" readonly /></div>
      <div class="field"><label>녹화 시작/정지</label><input type="text" class="shortcut" id="sc-record" readonly /></div>
    </div>

    <h2>녹화</h2>
    <div class="field">
      <label>출력 포맷 (복수 선택 가능)</label>
      <label class="check"><input type="checkbox" id="exportMp4" /> MP4 (H.264)</label>
      <label class="check"><input type="checkbox" id="exportGif" /> GIF</label>
      <label class="check"><input type="checkbox" id="keepWebm" /> 원본 WebM 유지</label>
      <div class="hint">아무것도 선택하지 않으면 원본 WebM 으로 저장됩니다.</div>
    </div>
    <div class="field">
      <label>FPS</label>
      <input type="number" id="recordFps" min="5" max="60" />
    </div>

    <h2>업데이트</h2>
    <div class="update-card">
      <div class="update-head">
        <span class="update-version">현재 버전 <span id="currentVersion">—</span></span>
      </div>
      <progress id="updateProgress" max="100" value="0"></progress>
      <div class="update-message" id="updateMessage">업데이트 확인 버튼을 눌러주세요.</div>
      <div class="update-actions">
        <button class="ghost" id="checkUpdate">업데이트 확인</button>
        <button id="updateAction" style="display:none;"></button>
        <button class="ghost" id="openReleases">릴리즈 페이지</button>
      </div>
    </div>

    <div class="row" style="margin-top:16px;">
      <button id="save">저장</button>
      <span class="status" id="status"></span>
    </div>
    <script type="module" src="./settings.ts"></script>
  </body>
</html>
